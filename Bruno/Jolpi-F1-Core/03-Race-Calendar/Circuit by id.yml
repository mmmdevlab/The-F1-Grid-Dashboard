info:
  name: Circuit by id
  type: http
  seq: 1

http:
  method: GET
  url: https://api.jolpi.ca/ergast/f1/:season/circuits/:circuitId/races/
  params:
    - name: season
      value: "2026"
      type: path
    - name: circuitId
      value: albert_park
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
