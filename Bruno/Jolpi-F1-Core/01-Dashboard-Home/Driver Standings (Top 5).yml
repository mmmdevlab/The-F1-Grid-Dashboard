info:
  name: Driver Standings (Top 5)
  type: http
  seq: 1

http:
  method: GET
  url: https://api.jolpi.ca/ergast/f1/:season/driverstandings.json?limit=5
  params:
    - name: limit
      value: "5"
      type: query
    - name: season
      value: "2026"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
