info:
  name: Forecast by Location
  type: http
  seq: 1

http:
  method: GET
  url: https://api.weatherapi.com/v1/forecast.json?key={{process.env.VITE_WEATHER_API_KEY}}&q=Suzuka&days=3&aqi=no
  params:
    - name: key
      value: "{{process.env.VITE_WEATHER_API_KEY}}"
      type: query
    - name: q
      value: Suzuka
      type: query
    - name: days
      value: "3"
      type: query
    - name: aqi
      value: no
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
